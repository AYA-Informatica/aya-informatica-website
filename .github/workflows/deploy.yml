# ─────────────────────────────────────────────────────────────
# CI/CD Pipeline — AYA Informatica
# Handles: lint → type-check → build → deploy to Vercel
# Rollback strategy: Vercel Instant Rollback (see notes below)
# ─────────────────────────────────────────────────────────────

name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Quality gates ───────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  # ── 2. Build verification ──────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

  # ── 3. Production deploy — only on main push ──────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://ayainformatica.tech
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

# ─────────────────────────────────────────────────────────────
# ROLLBACK STRATEGY
#
# Vercel provides instant rollback via two mechanisms:
#
# 1. Instant Rollback (recommended):
#    - Every deploy creates an immutable deployment URL.
#    - In Vercel Dashboard → Project → Deployments → click any
#      previous deployment → "Promote to Production"
#    - Takes < 5 seconds. No rebuild required.
#
# 2. CLI Rollback:
#    npx vercel rollback [deployment-url]
#
# 3. This pipeline blocks production deploys if lint, type-check,
#    or build fails — preventing bad code from reaching production.
#
# 4. For a full Blue-Green strategy at scale:
#    - Use Vercel Preview Deployments for every PR
#    - Only merge to main after QA on the preview URL
#    - Keep the last 5 production deployments in Vercel for
#      instant rollback at any time
# ─────────────────────────────────────────────────────────────
